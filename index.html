<body>

<div class="container">
    <h2>TCK158İbanMağdurları</h2>
    <span class="subtitle">İlgili grubu seçerek mail gönderimini başlatın.</span>

    <div class="group-card">
        <span class="group-name">AK PARTİ GRUBU</span>
        <button class="btn-send" onclick="mailGonder(1)">Gmail ile Hazırla ve Gönder</button>
    </div>

    <div class="group-card">
        <span class="group-name">İKİNCİ GRUP</span>
        <button class="btn-send btn-empty" onclick="mailGonder(2)">Grup Henüz Hazır Değil</button>
    </div>

    <div class="group-card">
        <span class="group-name">ÜÇÜNCÜ GRUP</span>
        <button class="btn-send btn-empty" onclick="mailGonder(3)">Grup Henüz Hazır Değil</button>
    </div>

    <div class="group-card">
        <span class="group-name">DÖRDÜNCÜ GRUP</span>

        2: { konu: "Grup 2 Konusu", mesaj: "Grup 2 Mesajı", mailler: [] },
        3: { konu: "Grup 3 Konusu", mesaj: "Grup 3 Mesajı", mailler: [] },
        4: { konu: "Grup 4 Konusu", mesaj: "Grup 4 Mesajı", mailler: [] }
    };

    function mailGonder(id) {
        const grup = veriler[id];
        if (grup.mailler.length === 0) {
            alert("Bu grup henüz doldurulmamış!");
            return;
        }
        const bccList = grup.mailler.join(",");
        const link = `mailto:?bcc=${bccList}&subject=${encodeURIComponent(grup.konu)}&body=${encodeURIComponent(grup.mesaj)}`;
        window.location.href = link;
    }
</script>
