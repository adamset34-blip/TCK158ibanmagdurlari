        }

        // Sayaç Artırma (Veritabanı)
        sayacRef.transaction((currentValue) => {
            return (currentValue || 0) + 1;
        });

        const grup = veriler[id];
        const bccList = grup.mailler.join(",");
        const subject = encodeURIComponent(grup.konu);
        const body = encodeURIComponent(grup.mesaj);

        const gmailURL = `googlegmail:///co?bcc=${bccList}&subject=${subject}&body=${body}`;
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

        if (isIOS) {
            window.location.href = gmailURL;
            setTimeout(() => {
                if (confirm("Gmail uygulaması açılamadı. Gmail yüklü mü?")) {
                    window.location.href = "https://apps.apple.com/tr/app/gmail-e-posta-google-dan/id422689480";
                }
            }, 2500);
        } else {
            window.location.href = `mailto:?bcc=${bccList}&subject=${subject}&body=${body}`;
        }
    }
</script>
